<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest | מנתח השקעות חכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0A0B; color: #F0F0F0; margin: 0; padding: 0; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: #151619; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .score-box { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; font-family: 'JetBrains Mono'; }
        .btn-primary { background: #10b981; color: #000; font-weight: 800; transition: all 0.2s; cursor: pointer; }
        .btn-primary:hover { background: #059669; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        input, select, textarea { background: rgba(0,0,0,0.4) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #10b981 !important; }
        .axis-label { font-size: 10px; font-weight: 700; fill: rgba(255,255,255,0.3); text-transform: uppercase; }
        .grid line { stroke: rgba(255,255,255,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen relative overflow-x-hidden">
    <!-- Background Glow -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-500/5 blur-[120px] rounded-full pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/5 blur-[120px] rounded-full pointer-events-none"></div>

    <div class="max-w-7xl mx-auto relative z-10">
        <!-- Header -->
        <header class="mb-12 flex justify-between items-center border-b border-white/10 pb-8">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-emerald-500 rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                    <i data-lucide="trending-up" class="text-black w-7 h-7"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tight">SmartInvest</h1>
                    <p class="text-[10px] uppercase tracking-[0.2em] opacity-40 font-mono">Advanced Financial Intelligence</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Sidebar: Controls -->
            <aside class="lg:col-span-4 space-y-6">
                <div class="card p-8">
                    <div class="flex items-center gap-2 mb-8">
                        <i data-lucide="target" class="w-5 h-5 text-emerald-500"></i>
                        <h2 class="text-lg font-semibold">הגדרות אנליזה</h2>
                    </div>
                    
                    <div class="space-y-8">
                        <div class="space-y-3">
                            <label class="block text-[11px] uppercase tracking-wider opacity-40 font-mono">רשימת מניות (שם, תשואה, סיכון)</label>
                            <textarea id="stockInput" rows="6" class="w-full rounded-xl px-4 py-3 text-xs font-mono leading-relaxed">NVDA, 45, 9
AAPL, 18, 4
TSLA, 35, 10
MSFT, 15, 3
GOOGL, 22, 5
AMZN, 20, 6
LLY, 40, 5</textarea>
                        </div>

                        <div class="space-y-3">
                            <label class="block text-[11px] uppercase tracking-wider opacity-40 font-mono">סיכון מבוקש (1-10)</label>
                            <input type="range" id="riskLevel" min="1" max="10" value="5" class="w-full accent-emerald-500">
                        </div>

                        <div class="space-y-3">
                            <label class="block text-[11px] uppercase tracking-wider opacity-40 font-mono">אופק השקעה</label>
                            <select id="horizon" class="w-full rounded-xl px-4 py-3 text-sm font-bold">
                                <option value="short">קצר (עד שנה)</option>
                                <option value="medium" selected>בינוני (1-5 שנים)</option>
                                <option value="long">ארוך (5+ שנים)</option>
                            </select>
                        </div>

                        <button onclick="processData()" class="btn-primary w-full py-4 rounded-xl flex items-center justify-center gap-3 shadow-lg">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                            <span>עדכן ניתוח</span>
                        </button>
                    </div>
                </div>
            </aside>

            <section class="lg:col-span-8 space-y-8">
                <div id="graphContainer" class="card p-8">
                    <div id="chart" class="w-full flex justify-center min-h-[350px]"></div>
                </div>

                <div class="card overflow-hidden min-h-[400px]">
                    <div id="resultsList" class="divide-y divide-white/5"></div>
                </div>
            </section>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function processData() {
            const input = document.getElementById('stockInput').value;
            const riskLevel = parseInt(document.getElementById('riskLevel').value);
            const horizon = document.getElementById('horizon').value;
            const resultsList = document.getElementById('resultsList');

            const lines = input.trim().split('\n');
            let stocks = lines.map(line => {
                const parts = line.split(',').map(s => s.trim());
                if (parts.length < 3) return null;
                return {
                    ticker: parts[0],
                    numericReturn: parseFloat(parts[1]) || 0,
                    volatility: parseFloat(parts[2]) || 0
                };
            }).filter(s => s !== null);

            if (stocks.length === 0) return;

            const maxRet = Math.max(...stocks.map(s => s.numericReturn), 1);
            stocks = stocks.map(s => {
                const returnScore = (s.numericReturn / maxRet) * 100;
                const riskDiff = Math.abs(s.volatility - riskLevel);
                const riskMatchScore = Math.max(0, 100 - (riskDiff * 15));
                let timeScore = 0;
                if (horizon === 'short') timeScore = 100 - (s.volatility * 10);
                else if (horizon === 'medium') timeScore = 100 - (Math.abs(s.volatility - 5) * 10);
                else timeScore = returnScore;

                return {
                    ...s,
                    riskLevel: s.volatility <= 3 ? 'Low' : s.volatility <= 7 ? 'Medium' : 'High',
                    score: Math.round((returnScore * 0.4) + (riskMatchScore * 0.4) + (timeScore * 0.2))
                };
            }).sort((a, b) => b.score - a.score);

            resultsList.innerHTML = '';
            stocks.forEach(stock => {
                const item = document.createElement('div');
                item.className = 'p-8 hover:bg-white/[0.02] transition-all';
                item.innerHTML = `
                    <div class="grid grid-cols-12 items-center">
                        <div class="col-span-3">
                            <div class="text-2xl font-black font-mono text-emerald-400">${stock.ticker}</div>
                            <div class="text-[10px] opacity-40 font-mono mt-1">Manual Entry Asset</div>
                        </div>
                        <div class="col-span-3">
                            <div class="text-lg font-mono text-emerald-500">${stock.numericReturn}%</div>
                            <div class="text-[10px] opacity-40 uppercase tracking-wider">Estimated Return</div>
                        </div>
                        <div class="col-span-3">
                            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border text-[10px] font-bold uppercase tracking-wider ${
                                stock.riskLevel === 'Low' ? 'border-emerald-500/20 bg-emerald-500/10 text-emerald-400' :
                                stock.riskLevel === 'Medium' ? 'border-blue-500/20 bg-blue-500/10 text-blue-400' :
                                'border-orange-500/20 bg-orange-500/10 text-orange-400'
                            }">
                                ${stock.riskLevel} Risk (${stock.volatility}/10)
                            </div>
                        </div>
                        <div class="col-span-3 text-left">
                            <div class="flex items-center justify-end gap-4">
                                <div class="score-box ${stock.score >= 80 ? 'bg-emerald-500 text-black' : 'bg-white/5 border border-white/10'}">${stock.score}</div>
                            </div>
                        </div>
                    </div>`;
                resultsList.appendChild(item);
            });
            renderChart(stocks);
        }

        function renderChart(data) {
            const container = document.getElementById('chart');
            container.innerHTML = '';
            const margin = {top: 40, right: 80, bottom: 60, left: 60}, width = container.offsetWidth - margin.left - margin.right, height = 350 - margin.top - margin.bottom;
            const svg = d3.select("#chart").append("svg").attr("width", width + margin.left + margin.right).attr("height", height + margin.top + margin.bottom).append("g").attr("transform", `translate(${margin.left},${margin.top})`);
            const x = d3.scaleLinear().domain([0, 11]).range([0, width]), y = d3.scaleLinear().domain([0, d3.max(data, d => d.numericReturn) * 1.2]).range([height, 0]);
            svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x)).attr("color", "rgba(255,255,255,0.1)");
            svg.append("g").call(d3.axisLeft(y)).attr("color", "rgba(255,255,255,0.1)");
            const dots = svg.selectAll("dot").data(data).enter().append("g");
            dots.append("circle").attr("cx", d => x(d.volatility)).attr("cy", d => y(d.numericReturn)).attr("r", 6).style("fill", d => d.score >= 80 ? "#10b981" : "rgba(255,255,255,0.2)");
            dots.append("text").attr("x", d => x(d.volatility)).attr("y", d => y(d.numericReturn) - 15).style("font-size", "10px").style("fill", "rgba(255,255,255,0.5)").style("text-anchor", "middle").text(d => `${d.ticker} (${d.score})`);
        }
        
        processData();
    </script>
</body>
</html>

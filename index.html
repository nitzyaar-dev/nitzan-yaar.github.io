<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest AI - עוזר השקעות חכם</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Recharts (Graphs) -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0B;
            color: #F0F0F0;
            margin: 0;
        }
        .glass {
            background: rgba(21, 22, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .emerald-glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
        }
        input:focus, select:focus {
            border-color: #10b981 !important;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { ScatterChart, Scatter, XAxis, YAxis, ZAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, LabelList } = Recharts;

        const STOCKS_DB = [
            { ticker: 'NVDA', name: 'NVIDIA', price: 875.20, volatility: 9, annualReturn: 45, marketCap: '2.1T' },
            { ticker: 'AAPL', name: 'Apple', price: 172.50, volatility: 4, annualReturn: 15, marketCap: '2.6T' },
            { ticker: 'TSLA', name: 'Tesla', price: 163.50, volatility: 10, annualReturn: 35, marketCap: '520B' },
            { ticker: 'MSFT', name: 'Microsoft', price: 415.10, volatility: 3, annualReturn: 18, marketCap: '3.1T' },
            { ticker: 'GOOGL', name: 'Alphabet', price: 151.20, volatility: 5, annualReturn: 22, marketCap: '1.9T' },
            { ticker: 'AMZN', name: 'Amazon', price: 178.10, volatility: 6, annualReturn: 20, marketCap: '1.8T' },
            { ticker: 'LLY', name: 'Eli Lilly', price: 750.40, volatility: 5, annualReturn: 40, marketCap: '710B' },
            { ticker: 'META', name: 'Meta', price: 495.20, volatility: 7, annualReturn: 28, marketCap: '1.2T' }
        ];

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [minPrice, setMinPrice] = useState('10');
            const [maxPrice, setMaxPrice] = useState('1000');
            const [riskLevel, setRiskLevel] = useState('Medium');
            const [results, setResults] = useState([]);
            const [aiInsight, setAiInsight] = useState('');
            const [loading, setLoading] = useState(false);

            const analyzeStocks = async () => {
                setLoading(true);
                setAiInsight('');
                
                const min = parseFloat(minPrice) || 0;
                const max = parseFloat(maxPrice) || Infinity;
                
                const scored = STOCKS_DB
                    .filter(s => s.price >= min && s.price <= max)
                    .map(s => {
                        const targetRisk = riskLevel === 'Low' ? 3 : riskLevel === 'Medium' ? 6 : 9;
                        const score = Math.round(100 - (Math.abs(s.volatility - targetRisk) * 10));
                        return { ...s, score: Math.max(0, score) };
                    })
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 5);

                setResults(scored);

                if (apiKey) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Analyze these stocks for a ${riskLevel} risk investor: ${scored.map(s => s.ticker).join(', ')}. Provide a short Hebrew summary.` }] }]
                            })
                        });
                        const data = await response.json();
                        setAiInsight(data.candidates[0].content.parts[0].text);
                    } catch (e) {
                        setAiInsight("שגיאה בחיבור ל-AI. וודא שמפתח ה-API תקין.");
                    }
                }
                setLoading(false);
            };

            useEffect(() => {
                analyzeStocks();
                setTimeout(() => lucide.createIcons(), 500);
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-emerald-500 p-3 rounded-2xl emerald-glow">
                                <i data-lucide="sparkles" className="text-black w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-3xl font-extrabold tracking-tight">SmartInvest <span className="text-emerald-500">AI</span></h1>
                                <p className="text-xs opacity-40 font-mono uppercase tracking-widest">Financial Intelligence Engine</p>
                            </div>
                        </div>
                        
                        <div className="glass p-2 rounded-xl flex items-center gap-3 w-full md:w-auto">
                            <i data-lucide="key" className="text-emerald-500 w-4 h-4 mr-2"></i>
                            <input 
                                type="password" 
                                placeholder="הזן Gemini API Key לניתוח AI" 
                                className="bg-transparent text-xs w-full md:w-64"
                                value={apiKey}
                                onChange={(e) => setApiKey(e.target.value)}
                            />
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <aside className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-3xl space-y-8">
                                <h2 className="text-xl font-bold flex items-center gap-3">
                                    <i data-lucide="settings-2" className="text-emerald-500"></i> הגדרות
                                </h2>
                                
                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest">טווח מחירים ($)</label>
                                    <div className="flex gap-3">
                                        <input type="number" value={minPrice} onChange={e => setMinPrice(e.target.value)} className="glass w-full p-3 rounded-xl text-sm" placeholder="Min" />
                                        <input type="number" value={maxPrice} onChange={e => setMaxPrice(e.target.value)} className="glass w-full p-3 rounded-xl text-sm" placeholder="Max" />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest">רמת סיכון</label>
                                    <select value={riskLevel} onChange={e => setRiskLevel(e.target.value)} className="glass w-full p-3 rounded-xl text-sm appearance-none">
                                        <option value="Low">נמוך (סולידי)</option>
                                        <option value="Medium">בינוני (מאוזן)</option>
                                        <option value="High">גבוה (אגרסיבי)</option>
                                    </select>
                                </div>

                                <button 
                                    onClick={analyzeStocks}
                                    className="w-full bg-emerald-500 text-black font-black py-4 rounded-2xl hover:bg-emerald-400 transition-all emerald-glow flex items-center justify-center gap-3"
                                >
                                    {loading ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="refresh-cw"></i>}
                                    עדכן ניתוח
                                </button>
                            </div>
                        </aside>

                        {/* Content */}
                        <div className="lg:col-span-8 space-y-6">
                            {aiInsight && (
                                <div className="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl italic text-sm leading-relaxed">
                                    <div className="flex items-center gap-2 mb-2 text-emerald-500 not-italic font-bold text-xs uppercase">
                                        <i data-lucide="brain" className="w-4 h-4"></i> תובנת AI
                                    </div>
                                    {aiInsight}
                                </div>
                            )}

                            <div className="glass p-6 rounded-3xl h-[300px]">
                                <ResponsiveContainer width="100%" height="100%">
                                    <ScatterChart margin={{ top: 20, right: 20, bottom: 20, left: 20 }}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" />
                                        <XAxis type="number" dataKey="volatility" name="Risk" stroke="rgba(255,255,255,0.3)" fontSize={10} />
                                        <YAxis type="number" dataKey="annualReturn" name="Return" stroke="rgba(255,255,255,0.3)" fontSize={10} />
                                        <Tooltip cursor={{ strokeDasharray: '3 3' }} contentStyle={{backgroundColor: '#151619', border: 'none', borderRadius: '12px'}} />
                                        <Scatter name="Stocks" data={results} fill="#10b981">
                                            {results.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.score > 80 ? '#10b981' : '#3f3f46'} />
                                            ))}
                                            <LabelList dataKey="ticker" position="top" style={{fill: 'rgba(255,255,255,0.5)', fontSize: '10px'}} />
                                        </Scatter>
                                    </ScatterChart>
                                </ResponsiveContainer>
                            </div>

                            <div className="glass rounded-3xl overflow-hidden">
                                {results.map(stock => (
                                    <div key={stock.ticker} className="p-6 border-b border-white/5 flex justify-between items-center hover:bg-white/[0.02] transition-all">
                                        <div>
                                            <div className="text-xl font-black text-emerald-400 font-mono">{stock.ticker}</div>
                                            <div className="text-[10px] opacity-40 uppercase">{stock.name}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-lg font-bold">${stock.price}</div>
                                            <div className="text-[10px] text-emerald-500 font-bold">+{stock.annualReturn}% Annual</div>
                                        </div>
                                        <div className="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center font-black text-emerald-500 border border-white/10">
                                            {stock.score}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Refresh icons
        setInterval(() => lucide.createIcons(), 2000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest AI - ניתוח השקעות חכם</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0B;
            color: #F0F0F0;
            margin: 0;
        }
        .glass {
            background: rgba(21, 22, 25, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .emerald-glow {
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15);
        }
        input, select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, select:focus {
            border-color: #10b981 !important;
            outline: none;
        }
        .ai-gradient {
            background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STOCKS_DB = [
            { ticker: 'NVDA', name: 'NVIDIA', price: 875.20, volatility: 9, return: 45, cap: '2.1T' },
            { ticker: 'AAPL', name: 'Apple', price: 172.50, volatility: 4, return: 15, cap: '2.6T' },
            { ticker: 'TSLA', name: 'Tesla', price: 163.50, volatility: 10, return: 35, cap: '520B' },
            { ticker: 'MSFT', name: 'Microsoft', price: 415.10, volatility: 3, return: 18, cap: '3.1T' },
            { ticker: 'GOOGL', name: 'Google', price: 151.20, volatility: 5, return: 22, cap: '1.9T' },
            { ticker: 'AMZN', name: 'Amazon', price: 178.10, volatility: 6, return: 20, cap: '1.8T' },
            { ticker: 'LLY', name: 'Eli Lilly', price: 750.40, volatility: 5, return: 40, cap: '710B' },
            { ticker: 'META', name: 'Meta', price: 495.20, volatility: 7, return: 28, cap: '1.2T' }
        ];

        function App() {
            const [minPrice, setMinPrice] = useState(10);
            const [maxPrice, setMaxPrice] = useState(1000);
            const [risk, setRisk] = useState('Medium');
            const [horizon, setHorizon] = useState('Medium');
            const [results, setResults] = useState([]);
            const [aiInsight, setAiInsight] = useState('');
            const [loading, setLoading] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [showKeyModal, setShowKeyModal] = useState(false);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const handleSearch = async () => {
                setLoading(true);
                
                // 1. לוגיקת סינון ודירוג (האלגוריתם)
                const scored = STOCKS_DB
                    .filter(s => s.price >= minPrice && s.price <= maxPrice)
                    .map(s => {
                        const targetRisk = risk === 'Low' ? 3 : risk === 'Medium' ? 6 : 9;
                        const riskDiff = Math.abs(s.volatility - targetRisk);
                        const riskScore = Math.max(0, 100 - (riskDiff * 15));
                        const returnScore = (s.return / 45) * 100;
                        
                        let multiplier = 1;
                        if (horizon === 'Short' && s.volatility <= 4) multiplier = 1.2;
                        if (horizon === 'Long' && s.return >= 25) multiplier = 1.2;

                        const totalScore = Math.round(((riskScore * 0.5) + (returnScore * 0.5)) * multiplier);
                        return { ...s, score: Math.min(100, totalScore) };
                    })
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 5);

                setResults(scored);
                updateChart(scored);

                // 2. ניתוח AI אמיתי (Gemini)
                if (apiKey && scored.length > 0) {
                    try {
                        const prompt = `נתח את 5 המניות הבאות עבור משקיע עם סיכון ${risk} ואופק השקעה ${horizon}: ${scored.map(s => s.ticker).join(', ')}. כתוב סיכום מקצועי וקצר בעברית (עד 100 מילים).`;
                        
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await response.json();
                        setAiInsight(data.candidates[0].content.parts[0].text);
                    } catch (e) {
                        setAiInsight("שגיאה בחיבור ל-AI. וודא שמפתח ה-API תקין.");
                    }
                } else {
                    setAiInsight("הזן מפתח API בהגדרות כדי לקבל ניתוח AI חי ב-GitHub.");
                }
                setLoading(false);
            };

            const updateChart = (data) => {
                if (!chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'bubble',
                    data: {
                        datasets: [{
                            label: 'מניות',
                            data: data.map(s => ({ x: s.volatility, y: s.return, r: s.score / 4 })),
                            backgroundColor: 'rgba(16, 185, 129, 0.5)',
                            borderColor: '#10b981',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'סיכון (1-10)', color: '#666' }, min: 0, max: 11 },
                            y: { title: { display: true, text: 'תשואה %', color: '#666' } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            };

            const saveApiKey = (key) => {
                localStorage.setItem('gemini_api_key', key);
                setApiKey(key);
                setShowKeyModal(false);
            };

            useEffect(() => {
                handleSearch();
                if (window.lucide) window.lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-12">
                        <div className="flex items-center gap-4">
                            <div className="bg-emerald-500 p-3 rounded-2xl emerald-glow">
                                <i data-lucide="sparkles" className="text-black w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black tracking-tight">SmartInvest <span className="ai-gradient">AI</span></h1>
                                <p className="text-[10px] opacity-30 uppercase tracking-widest">Real-time AI Analysis</p>
                            </div>
                        </div>
                        <button onClick={() => setShowKeyModal(true)} className="glass p-3 rounded-xl hover:bg-white/10 transition-all">
                            <i data-lucide="key" className="w-5 h-5 text-emerald-500"></i>
                        </button>
                    </header>

                    {/* API Key Modal */}
                    {showKeyModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="glass p-8 rounded-[2rem] max-w-md w-full space-y-6">
                                <h3 className="text-xl font-bold">הגדרת AI ל-GitHub</h3>
                                <p className="text-xs opacity-50 leading-relaxed">כדי שהאתר יעבוד עם AI אמיתי ב-GitHub, עליך להזין מפתח Gemini API. המפתח נשמר רק בדפדפן שלך.</p>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="w-full p-4 rounded-xl text-sm" 
                                    placeholder="הדבק מפתח Gemini כאן..." 
                                />
                                <div className="flex gap-3">
                                    <button onClick={() => saveApiKey(apiKey)} className="flex-1 bg-emerald-500 text-black font-bold py-3 rounded-xl">שמור</button>
                                    <button onClick={() => setShowKeyModal(false)} className="flex-1 glass py-3 rounded-xl">ביטול</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <aside className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] space-y-8">
                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest block">טווח מחיר ($)</label>
                                    <div className="flex gap-3">
                                        <input type="number" value={minPrice} onChange={e => setMinPrice(e.target.value)} className="w-full p-3 rounded-xl text-sm" />
                                        <input type="number" value={maxPrice} onChange={e => setMaxPrice(e.target.value)} className="w-full p-3 rounded-xl text-sm" />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest block">רמת סיכון</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Low', 'Medium', 'High'].map(l => (
                                            <button 
                                                key={l}
                                                onClick={() => setRisk(l)}
                                                className={`py-2 rounded-lg text-[10px] font-bold uppercase border ${risk === l ? 'bg-emerald-500 border-emerald-500 text-black' : 'border-white/10 opacity-40'}`}
                                            >
                                                {l === 'Low' ? 'נמוך' : l === 'Medium' ? 'בינוני' : 'גבוה'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest block">אופק השקעה</label>
                                    <select value={horizon} onChange={e => setHorizon(e.target.value)} className="w-full p-3 rounded-xl text-sm appearance-none cursor-pointer">
                                        <option value="Short">טווח קצר (עד שנה)</option>
                                        <option value="Medium">טווח בינוני (1-5 שנים)</option>
                                        <option value="Long">טווח ארוך (5+ שנים)</option>
                                    </select>
                                </div>

                                <button onClick={handleSearch} disabled={loading} className="w-full bg-emerald-500 text-black font-black py-4 rounded-2xl hover:bg-emerald-400 transition-all flex items-center justify-center gap-2">
                                    {loading ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="zap"></i>}
                                    הפעל ניתוח AI
                                </button>
                            </div>
                        </aside>

                        {/* Main */}
                        <div className="lg:col-span-8 space-y-6">
                            {/* AI Insight */}
                            <div className="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-3xl relative overflow-hidden">
                                <div className="flex items-center gap-2 mb-3 text-emerald-500 font-bold text-xs uppercase tracking-widest">
                                    <i data-lucide="brain" className="w-4 h-4"></i> AI Insight Summary
                                </div>
                                <p className="text-sm leading-relaxed italic opacity-90">
                                    {loading ? "ה-AI מנתח את הנתונים..." : `"${aiInsight}"`}
                                </p>
                            </div>

                            {/* Chart */}
                            <div className="glass p-6 rounded-[2.5rem] h-[300px]">
                                <canvas ref={chartRef}></canvas>
                            </div>

                            {/* List */}
                            <div className="space-y-3">
                                {results.map(stock => (
                                    <div key={stock.ticker} className="glass p-6 rounded-2xl flex justify-between items-center hover:bg-white/5 transition-all">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500 font-black text-xl">
                                                {stock.ticker[0]}
                                            </div>
                                            <div>
                                                <div className="font-black text-xl text-emerald-400">{stock.ticker}</div>
                                                <div className="text-[10px] opacity-30 uppercase font-bold">{stock.cap} Market Cap</div>
                                            </div>
                                        </div>
                                        <div className="text-right hidden md:block">
                                            <div className="font-bold text-lg">${stock.price}</div>
                                            <div className="text-[10px] text-emerald-500 font-bold">+{stock.return}% Annual Return</div>
                                        </div>
                                        <div className="flex flex-col items-center bg-white/5 px-5 py-2 rounded-xl border border-white/5">
                                            <div className="text-[8px] opacity-30 uppercase font-bold mb-1">AI Score</div>
                                            <div className="text-2xl font-black text-emerald-500">{stock.score}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 500);
    </script>
</body>
</html>

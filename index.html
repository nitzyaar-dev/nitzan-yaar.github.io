<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest AI - ניתוח השקעות חכם</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0D0D0E; color: #F0F0F0; margin: 0; }
        .glass { background: rgba(22, 22, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .emerald-glow { box-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
        select, input { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
        .ai-gradient { background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STOCKS_DB = [
            { ticker: 'NVDA', name: 'NVIDIA', price: 875, volatility: 9, return: 45, sector: 'טכנולוגיה' },
            { ticker: 'AAPL', name: 'Apple', price: 172, volatility: 4, return: 15, sector: 'טכנולוגיה' },
            { ticker: 'TSLA', name: 'Tesla', price: 163, volatility: 10, return: 35, sector: 'רכב' },
            { ticker: 'MSFT', name: 'Microsoft', price: 415, volatility: 3, return: 18, sector: 'טכנולוגיה' },
            { ticker: 'AMZN', name: 'Amazon', price: 178, volatility: 6, return: 20, sector: 'קמעונאות' },
            { ticker: 'GOOGL', name: 'Google', price: 151, volatility: 5, return: 22, sector: 'טכנולוגיה' },
            { ticker: 'META', name: 'Meta', price: 495, volatility: 7, return: 28, sector: 'טכנולוגיה' },
            { ticker: 'LLY', name: 'Eli Lilly', price: 750, volatility: 5, return: 40, sector: 'בריאות' }
        ];

        function App() {
            const [minPrice, setMinPrice] = useState(10);
            const [maxPrice, setMaxPrice] = useState(1000);
            const [risk, setRisk] = useState('Medium');
            const [horizon, setHorizon] = useState('Medium');
            const [results, setResults] = useState([]);
            const [aiInsight, setAiInsight] = useState('');
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // מנוע ה-AI הלוגי - מייצר ניתוח עמוק ללא צורך ב-API
            const generateSmartInsight = (topStocks, riskLevel, timeHorizon) => {
                if (topStocks.length === 0) return "לא נמצאו נתונים לניתוח.";
                
                const top = topStocks[0];
                const riskMap = { Low: 'סולידי', Medium: 'מאוזן', High: 'אגרסיבי' };
                const horizonMap = { Short: 'קצר (עד שנה)', Medium: 'בינוני (1-5 שנים)', Long: 'ארוך (5+ שנים)' };
                
                const intro = `על פי ניתוח המודל עבור פרופיל ${riskMap[riskLevel]} לטווח ${horizonMap[timeHorizon]}: `;
                const mainReason = `המנייה ${top.ticker} נבחרה כהזדמנות המובילה. `;
                const dataPoint = `עם תשואה שנתית של ${top.return}% ותנודתיות של ${top.volatility}/10, היא מציעה יחס סיכון-תועלת אופטימלי. `;
                
                let strategy = "";
                if (timeHorizon === 'Long') strategy = "בטווח הארוך, המודל צופה צמיחה יציבה המבוססת על דומיננטיות בשוק ה${top.sector}.";
                else if (timeHorizon === 'Short') strategy = "בטווח הקצר, המודל מזהה מומנטום חזק למרות התנודתיות.";
                else strategy = "בטווח הבינוני, המנייה מהווה עוגן מאוזן לתיק ההשקעות שלך.";

                return intro + mainReason + dataPoint + strategy;
            };

            const analyze = () => {
                setIsAnalyzing(true);
                
                // סימולציה של "חשיבת AI"
                setTimeout(() => {
                    const filtered = STOCKS_DB.filter(s => s.price >= minPrice && s.price <= maxPrice);
                    const scored = filtered.map(s => {
                        const targetRisk = risk === 'Low' ? 3 : risk === 'Medium' ? 6 : 9;
                        const riskMatch = 100 - (Math.abs(s.volatility - targetRisk) * 10);
                        const score = Math.round((riskMatch * 0.7) + (s.return * 0.3));
                        return { ...s, score: Math.min(100, Math.max(0, score)) };
                    }).sort((a, b) => b.score - a.score).slice(0, 5);

                    setResults(scored);
                    setAiInsight(generateSmartInsight(scored, risk, horizon));
                    updateChart(scored);
                    setIsAnalyzing(false);
                }, 800);
            };

            const updateChart = (data) => {
                if (!chartRef.current) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'bubble',
                    data: {
                        datasets: [{
                            data: data.map(s => ({ x: s.volatility, y: s.return, r: s.score / 4 })),
                            backgroundColor: 'rgba(16, 185, 129, 0.5)',
                            borderColor: '#10b981',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { title: { display: true, text: 'רמת סיכון', color: '#666' }, min: 0, max: 11 },
                            y: { title: { display: true, text: 'תשואה %', color: '#666' } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            };

            useEffect(() => {
                analyze();
                if (window.lucide) window.lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto">
                    <header className="flex items-center gap-4 mb-12">
                        <div className="bg-emerald-500 p-3 rounded-2xl emerald-glow">
                            <i data-lucide="brain-circuit" className="text-black w-8 h-8"></i>
                        </div>
                        <h1 className="text-3xl font-black tracking-tight">SmartInvest <span className="ai-gradient">AI</span></h1>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <aside className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 rounded-[2rem] space-y-8">
                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest">טווח מחיר ($)</label>
                                    <div className="flex gap-3">
                                        <input type="number" value={minPrice} onChange={e => setMinPrice(e.target.value)} className="w-full p-3 rounded-xl" />
                                        <input type="number" value={maxPrice} onChange={e => setMaxPrice(e.target.value)} className="w-full p-3 rounded-xl" />
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest">רמת סיכון</label>
                                    <select value={risk} onChange={e => setRisk(e.target.value)} className="w-full p-3 rounded-xl">
                                        <option value="Low">נמוך (סולידי)</option>
                                        <option value="Medium">בינוני (מאוזן)</option>
                                        <option value="High">גבוה (אגרסיבי)</option>
                                    </select>
                                </div>
                                <div className="space-y-4">
                                    <label className="text-[10px] uppercase opacity-40 font-bold tracking-widest">אופק השקעה</label>
                                    <select value={horizon} onChange={e => setHorizon(e.target.value)} className="w-full p-3 rounded-xl">
                                        <option value="Short">טווח קצר (עד שנה)</option>
                                        <option value="Medium">טווח בינוני (1-5 שנים)</option>
                                        <option value="Long">טווח ארוך (5+ שנים)</option>
                                    </select>
                                </div>
                                <button onClick={analyze} className="w-full bg-emerald-500 text-black font-black py-4 rounded-2xl hover:bg-emerald-400 transition-all flex items-center justify-center gap-2">
                                    {isAnalyzing ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="sparkles"></i>}
                                    הפעל ניתוח AI
                                </button>
                            </div>
                        </aside>

                        <div className="lg:col-span-8 space-y-6">
                            <div className="glass p-6 rounded-3xl border-emerald-500/20 bg-emerald-500/5">
                                <div className="flex items-center gap-2 mb-3 text-emerald-500 font-bold text-xs uppercase tracking-widest">
                                    <i data-lucide="bot" className="w-4 h-4"></i> תובנת מנוע ה-AI
                                </div>
                                <p className="text-sm leading-relaxed opacity-90 italic">
                                    {isAnalyzing ? "ה-AI מנתח נתוני שוק..." : `"${aiInsight}"`}
                                </p>
                            </div>

                            <div className="glass p-6 rounded-[2rem] h-[300px]">
                                <canvas ref={chartRef}></canvas>
                            </div>

                            <div className="space-y-3">
                                {results.map(stock => (
                                    <div key={stock.ticker} className="glass p-5 rounded-2xl flex justify-between items-center hover:bg-white/5 transition-all">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center text-emerald-500 font-black">{stock.ticker[0]}</div>
                                            <div>
                                                <div className="font-black text-lg">{stock.ticker}</div>
                                                <div className="text-[10px] opacity-30 uppercase">{stock.sector}</div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className="font-bold">${stock.price}</div>
                                            <div className="text-[10px] text-emerald-500 font-bold">+{stock.return}% תשואה</div>
                                        </div>
                                        <div className="text-2xl font-black text-emerald-500">{stock.score}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 500);
    </script>
</body>
</html>
